<div class="gestion-usuarios">
  <!-- Encabezado -->
  <header class="gestion-usuarios__header">
    <div class="header-left">
      <h2 class="gestion-usuarios__title">👥 Gestión de usuarios</h2>
      <p class="gestion-usuarios__subtitle">Administra los usuarios de la plataforma</p>
    </div>
    <div class="header-right">
      <button class="btn btn-primary" (click)="abrirModalNuevoUsuario()">
        ➕ Nuevo usuario
      </button>
    </div>
  </header>

  <!-- Estado de conexión -->
  <app-estado-conexion class="gestion-usuarios__connection"></app-estado-conexion>

  <!-- Filtros y búsqueda -->
  <div class="gestion-usuarios__filters">
    <div class="search-box">
      <input type="text" placeholder="Buscar por nombre o email..." [(ngModel)]="filtroBusqueda" (input)="filtrarUsuarios()" class="search-input" />
      <i class="search-icon">🔍</i>
    </div>
    <div class="filter-options">
      <select [(ngModel)]="filtroRol" (change)="filtrarUsuarios()" class="filter-select">
        <option value="">Todos los roles</option>
        <option value="atleta">Atletas</option>
        <option value="entrenador">Entrenadores</option>
        <option value="admin">Administradores</option>
      </select>
      <select [(ngModel)]="filtroEstado" (change)="filtrarUsuarios()" class="filter-select">
        <option value="">Todos los estados</option>
        <option value="activo">Activos</option>
        <option value="inactivo">Inactivos</option>
      </select>
    </div>
  </div>

  <!-- Loader mientras carga -->
  <app-loading-spinner *ngIf="cargando" [text]="'Cargando usuarios...'"></app-loading-spinner>

  <!-- Tabla de usuarios -->
  <div class="gestion-usuarios__table-container" *ngIf="!cargando">
    <table class="usuarios-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Estado</th>
          <th>Último acceso</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of usuariosFiltrados">
          <td>{{ user.nombre }}</td>
          <td>{{ user.email }}</td>
          <td>
            <span class="role-badge" [class]="'role-badge--' + user.rol">{{ user.rol | titlecase }}</span>
          </td>
          <td>
            <span class="status-badge" [class.status-badge--activo]="user.activo" [class.status-badge--inactivo]="!user.activo">
              {{ user.activo ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
          <td>{{ user.ultimoAcceso | date:'dd/MM/yyyy HH:mm' }}</td>
          <td class="actions-cell">
            <button class="icon-btn" (click)="editarUsuario(user)" title="Editar">✏️</button>
            <button class="icon-btn" (click)="toggleEstadoUsuario(user)" [title]="user.activo ? 'Desactivar' : 'Activar'">
              {{ user.activo ? '🔴' : '🟢' }}
            </button>
            <button class="icon-btn" (click)="confirmarEliminar(user)" title="Eliminar">🗑️</button>
          </td>
        </tr>
        <tr *ngIf="usuariosFiltrados.length === 0">
          <td colspan="6" class="no-results">No se encontraron usuarios</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal de usuario (nuevo/editar) -->
  <app-modal-confirmacion 
    *ngIf="modalUsuarioVisible"
    [isOpen]="true"
    [title]="modoEdicion ? 'Editar usuario' : 'Nuevo usuario'"
    [width]="'500px'"
    (confirm)="guardarUsuario()"
    (cancel)="cerrarModalUsuario()"
    [confirmText]="modoEdicion ? 'Actualizar' : 'Crear'"
    [cancelText]="'Cancelar'">
    
    <div class="usuario-form">
      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" [(ngModel)]="formUsuario.nombre" class="form-control" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="formUsuario.email" class="form-control" required />
      </div>
      <div class="form-group" *ngIf="!modoEdicion">
        <label for="password">Contraseña</label>
        <input type="password" id="password" [(ngModel)]="formUsuario.password" class="form-control" required />
      </div>
      <div class="form-group">
        <label for="rol">Rol</label>
        <select id="rol" [(ngModel)]="formUsuario.rol" class="form-control">
          <option value="atleta">Atleta</option>
          <option value="entrenador">Entrenador</option>
          <option value="admin">Administrador</option>
        </select>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" [(ngModel)]="formUsuario.activo" />
          Usuario activo
        </label>
      </div>
    </div>
  </app-modal-confirmacion>

  <!-- Modal de confirmación para eliminar -->
  <app-modal-confirmacion 
    *ngIf="modalEliminarVisible"
    [isOpen]="true"
    title="Confirmar eliminación"
    [message]="mensajeEliminar"
    (confirm)="eliminarUsuario()"
    (cancel)="cancelarEliminar()"
    confirmText="Eliminar"
    cancelText="Cancelar">
  </app-modal-confirmacion>
</div>
