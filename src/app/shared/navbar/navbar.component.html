<nav class="navbar" [class.navbar--scrolled]="isScrolled">
  <div class="navbar__container">
    <!-- Logo -->
    <a routerLink="/" class="navbar__logo">
      <img src="logo.svg" alt="Mutimedia Vela" />
    </a>

    <!-- Botón menú móvil -->
    <button
      class="navbar__toggle"
      (click)="toggleMenu()"
      aria-label="Toggle menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Menú principal -->
    <div class="navbar__menu" [class.navbar__menu--open]="isMenuOpen">
      <ul class="navbar__links">
        <li><a routerLink="/dashboard" routerLinkActive="active">Dashboard</a></li>
        <li><a routerLink="/contenidos" routerLinkActive="active">Contenidos</a></li>
        <li><a routerLink="/comunidad" routerLinkActive="active">Comunidad</a></li>
        <li><a routerLink="/talentos" routerLinkActive="active">Talentos</a></li>
        <li><a routerLink="/documentacion" routerLinkActive="active">Documentación</a></li>
      </ul>

      <!-- Acciones de usuario -->
      <div class="navbar__actions">
        <ng-container *ngIf="isAuthenticated; else loginBlock">
          <div class="navbar__user" (click)="toggleUserMenu()" #userMenuTrigger>
            <div class="navbar__avatar">
              <img [src]="userAvatar" alt="Avatar" *ngIf="userAvatar; else initials" />
              <ng-template #initials>
                <span class="navbar__initials">{{ userInitials }}</span>
              </ng-template>
            </div>
            <span class="navbar__username">{{ userName }}</span>
            <i class="navbar__arrow" [class.rotated]="isUserMenuOpen"></i>
          </div>
          <div class="navbar__dropdown" *ngIf="isUserMenuOpen">
            <a routerLink="/perfil">Mi Perfil</a>
            <a routerLink="/configuracion">Configuración</a>
            <hr />
            <a (click)="logout()">Cerrar sesión</a>
          </div>
        </ng-container>
        <ng-template #loginBlock>
          <a routerLink="/login" class="navbar__login-btn">Iniciar sesión</a>
        </ng-template>
      </div>
    </div>
  </div>
</nav>
