<div class="reproductor-video" [class.controles-ocultos]="!controlesVisibles" (mouseenter)="mostrarControles()" (mouseleave)="ocultarControles()">
  <!-- Título (opcional) -->
  <div class="video-titulo" *ngIf="title">
    <h3>{{ title }}</h3>
  </div>

  <!-- Contenedor del video -->
  <div class="video-container">
    <video
      #videoPlayer
      [src]="srcActual"
      [poster]="poster"
      [autoplay]="autoplay"
      (timeupdate)="onTimeUpdate()"
      (ended)="onEnded()"
      (play)="onPlay()"
      (pause)="onPause()"
      (loadedmetadata)="onLoadedMetadata()"
      (click)="togglePlay()"
    ></video>

    <!-- Overlay de reproducción (gran botón central) -->
    <div class="video-overlay" *ngIf="!isPlaying && !isSeeking" (click)="togglePlay()">
      <div class="play-button">▶</div>
    </div>
  </div>

  <!-- Controles personalizados -->
  <div class="video-controls" *ngIf="controlesVisibles">
    <!-- Barra de progreso -->
    <div class="progress-bar-container" (mousedown)="onProgressBarMouseDown($event)" (mousemove)="onProgressBarMouseMove($event)" (mouseup)="onProgressBarMouseUp()" (mouseleave)="onProgressBarMouseUp()">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" [style.width.%]="progress"></div>
        <div class="progress-bar-hover" [style.width.%]="hoverProgress" *ngIf="hoverProgress > 0"></div>
      </div>
    </div>

    <!-- Controles inferiores -->
    <div class="controls-bottom">
      <!-- Play/Pause -->
      <button class="control-btn" (click)="togglePlay()">
        <span *ngIf="isPlaying">⏸️</span>
        <span *ngIf="!isPlaying">▶️</span>
      </button>

      <!-- Volumen -->
      <div class="volume-control">
        <button class="control-btn" (click)="toggleMute()">
          <span *ngIf="volume === 0">🔇</span>
          <span *ngIf="volume > 0 && volume < 0.5">🔉</span>
          <span *ngIf="volume >= 0.5">🔊</span>
        </button>
        <input type="range" min="0" max="1" step="0.01" [value]="volume" (input)="setVolume($event)" class="volume-slider" />
      </div>

      <!-- Tiempo -->
      <div class="time-display">
        <span>{{ currentTime | duracion }}</span> / <span>{{ duration | duracion }}</span>
      </div>

      <!-- Velocidad -->
      <select class="speed-select" (change)="setPlaybackRate($event)" [value]="playbackRate">
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1.0" selected>1.0x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2.0">2.0x</option>
      </select>

      <!-- Pantalla completa -->
      <button class="control-btn" (click)="toggleFullscreen()">
        <span>⛶</span>
      </button>
    </div>
  </div>

  <!-- Lista de reproducción (opcional) -->
  <div class="playlist" *ngIf="playlist && playlist.length > 0">
    <h4>Lista de reproducción</h4>
    <ul class="playlist-items">
      <li *ngFor="let item of playlist; let i = index" (click)="seleccionarVideo(i)" [class.activo]="i === playlistIndex">
        <span class="playlist-index">{{ i + 1 }}.</span>
        <span class="playlist-titulo">{{ item.title }}</span>
        <span class="playlist-duracion">{{ (item.duration || 0) | duracion }}</span>
      </li>
    </ul>
  </div>
</div>
