<div class="spinner-container" [class.spinner-container--fullscreen]="fullscreen" [style.--spinner-size]="size + 'px'"
    [style.--spinner-color]="color">
    <div class="spinner" role="status" aria-label="Cargando">
        <div class="spinner__circle"></div>
    </div>
    <div class="spinner__text" *ngIf="text">
        {{ text }}
    </div>
</div>
