<aside class="sidebar" [class.sidebar--collapsed]="isCollapsed && !isMobileExpanded"
  [class.sidebar--expanded]="!isCollapsed || isMobileExpanded">
  <div class="sidebar__header">
    <a routerLink="/" class="sidebar__logo">
      <img src="iqfoil.png" alt="Multimedia Vela" style="height: 40px; width: 40px; object-fit: cover; border: none;" />
    </a>
    <button class="sidebar__toggle-mobile" (click)="toggleMobile()" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
    <button class="sidebar__toggle" (click)="toggleCollapse()" aria-label="Toggle sidebar">
      <span></span><span></span>
    </button>
  </div>

  <nav class="sidebar__nav">
    <ul class="sidebar__menu">
      <li *ngFor="let item of menuItems">
        <ng-container *ngIf="!item.children">
          <a [routerLink]="item.route" routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.exact ?? false }" class="sidebar__link">
            <i class="sidebar__icon">{{ item.icon }}</i>
            <span class="sidebar__label">{{ item.label }}</span>
          </a>
        </ng-container>
        <ng-container *ngIf="item.children">
          <div class="sidebar__submenu-trigger" (click)="toggleSubmenu(item)">
            <div class="sidebar__link">
              <i class="sidebar__icon">{{ item.icon }}</i>
              <span class="sidebar__label">{{ item.label }}</span>
              <i class="submenu-arrow" [class.rotated]="item.expanded ?? false">▼</i>
            </div>
          </div>
          <ul class="sidebar__submenu" *ngIf="item.expanded ?? false">
            <li *ngFor="let child of item.children">
              <a [routerLink]="child.route" routerLinkActive="active" class="sidebar__link sidebar__submenu-link">
                <i class="sidebar__icon">{{ child.icon }}</i>
                <span class="sidebar__label">{{ child.label }}</span>
              </a>
            </li>
          </ul>
        </ng-container>
      </li>
    </ul>
  </nav>

  <div class="sidebar__footer">
    <div class="sidebar-user" *ngIf="user && !loadingUser">
      <div class="user-avatar">
        <span class="initials">{{ userInitials }}</span>
      </div>
      <div class="user-info" [class.collapsed]="isCollapsed">
        <span class="user-name">{{ user.nombre || user.displayName || 'Usuario' }}</span>
        <span class="user-role" [class]="'role--' + (user.role || (user.roles ? user.roles[0] : ''))">
          {{ userRole }}
        </span>
        <span class="user-mentor" *ngIf="user.roles?.includes('atleta') && mentorNombre">
          👨‍🏫 {{ mentorNombre }}
        </span>
      </div>
    </div>
    <button class="sidebar__logout" (click)="logout()" *ngIf="user"
      [attr.aria-label]="(!isCollapsed || isMobileExpanded) ? null : 'Cerrar sesión'">
      <i class="sidebar__icon">🚪</i>
      <span class="sidebar__label" *ngIf="(!isCollapsed || isMobileExpanded)">Cerrar sesión</span>
    </button>
  </div>
</aside>
